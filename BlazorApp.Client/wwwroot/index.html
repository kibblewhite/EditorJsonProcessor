<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EditorJsonProcessor Demo</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BlazorApp.Client.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/leaflet@2.0.0-alpha.1/dist/leaflet.min.css" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="//byteloch-shared.gitlab.io/libraries/editorjs-leaflet/dist/viewer/0.0.11/leaflet-map-viewer.min.js" data-api-base="/api"></script>
    <style>
        .ce-leaflet-map-poi-icon { background: none; border: none; font-size: 1.5rem; text-align: center; line-height: 1; }
        [data-block-type="map"] { width: 70vw; max-width: 70vw; }
    </style>
</body>

</html>
